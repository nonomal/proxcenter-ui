sonar.projectKey=adminsyspro_proxcenter-ui
sonar.organization=adminsyspro
sonar.sources=frontend/src,weasyprint
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/__tests__/**
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/.vercel/**,**/*.min.js,**/*.bundle.js,frontend/src/@core/**,frontend/src/@layouts/**,frontend/src/@menu/**,**/*.jsx,frontend/src/lib/demo/**,frontend/src/messages/**

# Demo and i18n exclusions rationale:
# - frontend/src/lib/demo/** holds the mock datasets and seed data loaded
#   only when DEMO_MODE=true. It is not on the production code path; its
#   coverage/quality numbers would dilute the metrics that matter for the
#   live product.
# - frontend/src/messages/** holds the translation catalogs (fr/en/zh-CN
#   JSON). They are data, not logic; analysing them inflates the LOC count
#   (about 27k lines for three locales) without surfacing real risk.
# Together these two paths shed ~58k LOC, keeping the org well under
# SonarCloud's plan threshold without hiding any production code.

# Code coverage. Generated by `npm run test:coverage` (vitest with the v8
# provider) under frontend/coverage/lcov.info. The Sonar workflow runs the
# coverage step before invoking the scanner so this path resolves at scan
# time. Without this property Sonar reports new_coverage=0 and the
# Quality Gate fails on otherwise clean PRs.
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Coverage exclusions. Keep this list small and defensible: only files
# whose presence in the denominator dilutes the % without telling us
# anything about real test risk. Business-logic carriers (lib/**,
# app/api/**, components/**, middleware.ts) stay measured.
#
# - configs/**: static constants, no logic
# - types/**: TypeScript interfaces only
# - page.tsx / layout.tsx: Next.js entry points; the logic they orchestrate
#   lives in lib/, hooks/, components/ which remain measured
# - inventory/InventoryDetails.tsx, inventory/tabs/ClusterTabs.tsx,
#   inventory/tabs/NodeTabs.tsx, inventory/hooks/useHardwareHandlers.ts:
#   these are the four inventory UI container files (each 3000+ lines).
#   They are almost entirely JSX rendering and state wiring. Our Vitest
#   suite runs in a node environment (no jsdom, no React Testing Library),
#   so the render paths cannot execute, and counting every JSX line in the
#   denominator inflates the new-code coverage target above what is
#   reachable. All testable logic that lived inline (apt-update fetch
#   flow, permission-error aggregation) has been extracted into
#   lib/proxmox/loadNodeAptUpdates.ts and is fully covered there. Bugs,
#   code smells and security rules still apply to these files; only the
#   coverage metric is silenced.
# - inventory/components/ConsolePreview.tsx: the VM console tile. Pure JSX
#   rendering plus screenshot-poll state wired into React effects, none of
#   which executes under the node-env Vitest suite. The testable backend
#   logic it drives (serial/headless display detection, screenshot capture,
#   cache pruning) lives in the screenshot API route and IS covered by
#   screenshot/route.test.ts.
# - lib/migration/pipeline.ts, lib/migration/v2v-pipeline.ts,
#   lib/migration/xcpng-pipeline.ts: the three migration orchestrators
#   are long-running async functions that drive real PVE API calls, SSH
#   sessions, qemu-img conversions, virt-v2v and XO downloads end to
#   end. They cannot be exercised meaningfully under Vitest (no live
#   Proxmox + source hypervisor + storage) and their real test bed is
#   the manual migration matrix against staging clusters. Pure helpers
#   they call (pve-vm-config, configMapper, pvesm-alloc, v2v-progress)
#   stay measured.
sonar.coverage.exclusions=\
  frontend/src/configs/**,\
  frontend/src/types/**,\
  frontend/src/**/page.tsx,\
  frontend/src/**/layout.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/InventoryDetails.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/tabs/ClusterTabs.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/tabs/NodeTabs.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/hooks/useHardwareHandlers.ts,\
  frontend/src/app/(dashboard)/infrastructure/inventory/components/ConsolePreview.tsx,\
  frontend/src/lib/migration/pipeline.ts,\
  frontend/src/lib/migration/v2v-pipeline.ts,\
  frontend/src/lib/migration/xcpng-pipeline.ts

# Copy-paste detection exclusions. Static data catalogs (cloud image entries,
# vendor lists) repeat the same object shape by design — refactoring them
# into a generator hides the data from grep / IDE jump-to-definition. Dashboard
# widgets share a Card+CardHeader+CardContent skeleton on purpose so the grid
# stays visually consistent; extracting it would only push noise around.
# Create / Delete / Detach dialogs all follow MUI Dialog + Form patterns with
# near-identical structure — duplication is by intent, not by laziness.
sonar.cpd.exclusions=frontend/src/lib/templates/cloudImages.ts,\
  frontend/src/configs/globalThemesConfig.js,\
  frontend/src/components/dashboard/widgets/**/*,\
  frontend/src/components/ClusterFirewallTab.tsx,\
  frontend/src/components/hardware/DetachConfirmDialog.tsx,\
  frontend/src/components/hardware/DeleteUnusedDiskDialog.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/CreateVmDialog.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/CreateLxcDialog.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/BackupDashboard.tsx,\
  frontend/src/app/(dashboard)/infrastructure/inventory/components/EntityTagManager.tsx,\
  frontend/src/components/cluster-sdn/**/*,\
  frontend/src/components/automation/site-recovery/**/*

# Per-rule false-positive suppressions, scoped to specific files. SonarCloud
# evaluates each `e<n>` block as (ruleKey, resourceKey) and silences the
# matching issues without touching anything else.

# typescript:S1313 — hardcoded IP addresses. Triggered in:
#   - Test fixtures that legitimately need IPs to exercise IPAM / network
#     allocation logic (10.42.0.x, 192.168.x.x). The point of the test IS
#     the IP, redacting it would defeat the assertion.
#   - TextField `placeholder` props in network dialogs, which display
#     example formats like "192.168.1.10/24" to users. These are hints,
#     not addresses the app talks to.
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts

sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e2.resourceKey=frontend/src/components/hardware/AddNetworkDialog.tsx

sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e3.resourceKey=frontend/src/components/hardware/EditNetworkDialog.tsx

sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e4.resourceKey=frontend/src/components/mydc/**

sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e5.resourceKey=frontend/src/components/templates/IsoNetworkReservation.tsx

# typescript:S2068 — looks for "password" in identifiers. The hits are on a
# snake_case to camelCase mapping whose keys describe password-policy field
# names (password_min_length, password_require_uppercase, etc.), not on any
# value that holds a credential.
sonar.issue.ignore.multicriteria.e6.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e6.resourceKey=frontend/src/lib/compliance/policies.ts

# javascript:S2068 — audit-event constants and i18n labels that contain the
# word "password" (e.g. password_changed: 'audit.actions.passwordChange',
# passwordLabel: "Password"). Not credentials.
sonar.issue.ignore.multicriteria.e7.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e7.resourceKey=frontend/src/app/(dashboard)/security/audit/page.jsx

# json:S2068 — translation catalogs contain the user-facing word "password".
sonar.issue.ignore.multicriteria.e8.ruleKey=json:S2068
sonar.issue.ignore.multicriteria.e8.resourceKey=frontend/src/messages/*.json

# javascript:S6774 — "missing prop validation". React prop-types is deprecated;
# the project uses TypeScript for all new components (.tsx). The remaining
# .jsx files are vendored from the Materio admin template or use runtime
# composition where PropTypes would be churn for zero safety benefit.
sonar.issue.ignore.multicriteria.e9.ruleKey=javascript:S6774
sonar.issue.ignore.multicriteria.e9.resourceKey=**/*.jsx

sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9
