name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the images'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-frontend
  ORCHESTRATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-orchestrator

jobs:
  # ========================================
  # Run Frontend Tests
  # ========================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Run tests
        run: npx vitest run

  # ========================================
  # Build Frontend Image
  # ========================================
  build-frontend:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="$GH_REF_NAME"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_VERSION" && "$INPUT_VERSION" != "latest" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Frontend
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.resolve.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Make Frontend package public
        if: github.event_name != 'pull_request'
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/proxcenter-frontend \
            -d '{"visibility":"public"}'

  # ========================================
  # Build Demo Image
  # ========================================
  build-demo:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Demo
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:demo
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=demo
            DEMO_MODE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Run Backend Tests
  # Skipped for Dependabot PRs: they cannot access ORCHESTRATOR_PAT
  # and don't modify backend code.
  # ========================================
  test-backend:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve backend ref
        id: backend-ref
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          PAT: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          REF="main"
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            if git ls-remote --tags "https://x-access-token:${PAT}@github.com/adminsyspro/proxcenter-backend.git" "$GH_REF_NAME" | grep -q "$GH_REF_NAME"; then
              REF="$GH_REF_NAME"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        working-directory: ./backend
        run: go test ./internal/...

  # ========================================
  # Build Orchestrator Image
  # ========================================
  build-orchestrator:
    if: github.actor != 'dependabot[bot]'
    needs: [test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve backend ref
        id: backend-ref
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          PAT: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          REF="main"
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            if git ls-remote --tags "https://x-access-token:${PAT}@github.com/adminsyspro/proxcenter-backend.git" "$GH_REF_NAME" | grep -q "$GH_REF_NAME"; then
              REF="$GH_REF_NAME"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="$GH_REF_NAME"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_VERSION" && "$INPUT_VERSION" != "latest" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Orchestrator
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.ORCHESTRATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Create GitHub Release (on version tags)
  # ========================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-frontend, build-orchestrator]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES="Initial release"
          fi
          echo "notes<<NOTESEOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "NOTESEOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Changes

            ${{ steps.notes.outputs.notes }}

            ## Docker Images

            ```bash
            docker pull ghcr.io/adminsyspro/proxcenter-frontend:${{ github.ref_name }}
            docker pull ghcr.io/adminsyspro/proxcenter-orchestrator:${{ github.ref_name }}
            ```
          draft: false
          prerelease: false
          make_latest: true
