name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the images'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-frontend
  ORCHESTRATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-orchestrator
  WEASYPRINT_IMAGE: ghcr.io/${{ github.repository_owner }}/proxcenter-weasyprint

jobs:
  # ========================================
  # Run Frontend Tests
  # ========================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    # The vDC test suite (step 2.7) talks to a real Postgres via the
    # vitest globalSetup at src/__tests__/setup/postgres.ts.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proxcenter
          POSTGRES_PASSWORD: test-pass
          POSTGRES_DB: proxcenter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proxcenter -d proxcenter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        # --ignore-scripts above skips the postinstall, and we don't have a
        # postinstall that runs `prisma generate` anyway. Several test suites
        # (alerts/visibility, vdc/scope, vdc/sdn, vdc/vnets, vdc/backupJobs,
        # vdc/ipam*, db/vdcPbsBindings) import `@/lib/db/prisma` which loads
        # `.prisma/client/default` at module load time. Without this step the
        # suites fail with "Cannot find module .prisma/client/default".
        # The URL value is only required for the config to load, `prisma
        # generate` does not open a connection.
        env:
          DATABASE_URL: postgresql://proxcenter:test-pass@localhost:5432/proxcenter
        run: npx prisma generate

      - name: Install psql client
        # The test globalSetup shells out to psql to create / drop the
        # per-run schema; ubuntu-latest images ship without it.
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run tests
        env:
          POSTGRES_TEST_URL_BASE: postgresql://proxcenter:test-pass@localhost:5432/proxcenter
        run: npx vitest run

  # ========================================
  # Build Frontend Image
  # ========================================
  build-frontend:
    needs: [test, test-backend]
    if: ${{ always() && needs.test.result == 'success' && (needs.test-backend.result == 'success' || github.actor == 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="$GH_REF_NAME"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_VERSION" && "$INPUT_VERSION" != "latest" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Frontend
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ steps.resolve.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Make Frontend package public
        if: github.event_name != 'pull_request'
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/packages/container/proxcenter-frontend \
            -d '{"visibility":"public"}'

  # ========================================
  # Build Demo Image
  # ========================================
  build-demo:
    needs: [test, test-backend]
    if: ${{ always() && needs.test.result == 'success' && (needs.test-backend.result == 'success' || github.actor == 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Demo
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:demo
          build-args: |
            GIT_SHA=${{ github.sha }}
            APP_VERSION=demo
            DEMO_MODE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Build WeasyPrint Sidecar Image
  # ========================================
  # Tiny Flask service that turns the orchestrator's HTML report templates
  # into PDF documents. Built from `weasyprint/Dockerfile`. Published so
  # Enterprise deployments can pull a pinned image instead of rebuilding
  # locally on every `docker-compose up`.
  build-weasyprint:
    needs: [test, test-backend]
    if: ${{ always() && needs.test.result == 'success' && (needs.test-backend.result == 'success' || github.actor == 'dependabot[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="$GH_REF_NAME"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_VERSION" && "$INPUT_VERSION" != "latest" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for WeasyPrint
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.WEASYPRINT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push WeasyPrint
        uses: docker/build-push-action@v7
        with:
          context: ./weasyprint
          file: ./weasyprint/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # The proxcenter-weasyprint package stays PRIVATE on GHCR (Enterprise
      # only). A previous version of this workflow PATCHed it back to
      # public after every build, which silently reverted the operator's
      # privacy setting and additionally tripped githubactions:S7636
      # (secret expanded in a `run:` block). Keep the package's visibility
      # to whatever it was set to on the registry; do not touch it here.

  # ========================================
  # Run Backend Tests
  # Skipped for Dependabot PRs: they cannot access ORCHESTRATOR_PAT
  # and don't modify backend code.
  # ========================================
  test-backend:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Replication tests open a per-run schema on this Postgres via
    # POSTGRES_TEST_URL (mirrors the vitest globalSetup pattern). Tests
    # t.Skip when the env is absent so default `go test` works locally.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: proxcenter
          POSTGRES_PASSWORD: test-pass
          POSTGRES_DB: proxcenter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proxcenter -d proxcenter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve backend ref
        id: backend-ref
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          PAT: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          REF="main"
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            if git ls-remote --tags "https://x-access-token:${PAT}@github.com/adminsyspro/proxcenter-backend.git" "$GH_REF_NAME" | grep -q "$GH_REF_NAME"; then
              REF="$GH_REF_NAME"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        working-directory: ./backend
        env:
          POSTGRES_TEST_URL: postgres://proxcenter:test-pass@localhost:5432/proxcenter?sslmode=disable
        run: go test ./internal/...

  # ========================================
  # Build Orchestrator Image
  # ========================================
  build-orchestrator:
    if: github.actor != 'dependabot[bot]'
    needs: [test, test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve backend ref
        id: backend-ref
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          PAT: ${{ secrets.ORCHESTRATOR_PAT }}
        run: |
          REF="main"
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            if git ls-remote --tags "https://x-access-token:${PAT}@github.com/adminsyspro/proxcenter-backend.git" "$GH_REF_NAME" | grep -q "$GH_REF_NAME"; then
              REF="$GH_REF_NAME"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        env:
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "$GH_REF" == refs/tags/v* ]]; then
            VERSION="$GH_REF_NAME"
            echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_VERSION" && "$INPUT_VERSION" != "latest" ]]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata for Orchestrator
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.ORCHESTRATOR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.resolve.outputs.version }},enable=${{ steps.resolve.outputs.version != 'dev' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Orchestrator
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ========================================
  # Create GitHub Release (on version tags)
  # ========================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-frontend, build-demo, build-orchestrator, build-weasyprint]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Release notes are curated, never auto-generated from git log. Every
      # tagged version must ship with a hand-written RELEASE_NOTES_<TAG>.md
      # committed at the tagged SHA. The job hard-fails if the file is
      # missing, so a tag-push without notes can never overwrite an existing
      # release with a raw commit dump (regression observed on v1.4.0 after
      # a hot-fix force-push).
      - name: Build release body from curated notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${TAG}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error file=${NOTES_FILE}::Curated release notes are missing."
            echo "::error::Refusing to publish the GitHub release without ${NOTES_FILE}."
            echo "::error::Commit RELEASE_NOTES_${TAG}.md at the tagged SHA, then re-push the tag."
            exit 1
          fi
          {
            cat "$NOTES_FILE"
            cat <<EOF


## Docker Images

\`\`\`bash
docker pull ghcr.io/adminsyspro/proxcenter-frontend:${TAG}
docker pull ghcr.io/adminsyspro/proxcenter-orchestrator:${TAG}
docker pull ghcr.io/adminsyspro/proxcenter-weasyprint:${TAG}
\`\`\`
EOF
          } > /tmp/release-body.md
          echo "body_path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: false
          make_latest: true
