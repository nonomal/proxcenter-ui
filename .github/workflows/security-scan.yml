name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'

permissions:
  contents: read

jobs:
  # ========================================
  # Trivy: Scan Docker images for vulns
  # ========================================
  trivy-frontend:
    name: Trivy — Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Frontend image (local)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: proxcenter-frontend:scan
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Frontend image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'proxcenter-frontend:scan'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() || (failure() && hashFiles('trivy-frontend.sarif') != '')
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

  trivy-orchestrator:
    if: github.actor != 'dependabot[bot]'
    name: Trivy — Orchestrator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout backend repo
        uses: actions/checkout@v6
        with:
          repository: adminsyspro/proxcenter-backend
          ref: main
          path: backend
          token: ${{ secrets.ORCHESTRATOR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Orchestrator image (local)
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: proxcenter-orchestrator:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Orchestrator image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'proxcenter-orchestrator:scan'
          format: 'sarif'
          output: 'trivy-orchestrator.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: success() || (failure() && hashFiles('trivy-orchestrator.sarif') != '')
        with:
          sarif_file: 'trivy-orchestrator.sarif'
          category: 'trivy-orchestrator'

  # ========================================
  # Trivy: Scan filesystem (deps + secrets)
  # ========================================
  trivy-fs:
    name: Trivy — Filesystem (deps + secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln,secret'

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-filesystem'
