# ============================================
# ProxCenter Step 4 deployment validation
# - Local image (proxcenter-frontend:local)
# - Fresh Postgres (named volumes scoped to this stack)
# - Port 3030 to avoid clashes with `npm run dev` on 3000
# - Internal network unique to this stack
#
# Run:
#   docker compose -f docker-compose.step4-test.yml -p step4-test up -d
#   # browse http://localhost:3030
#   docker compose -f docker-compose.step4-test.yml -p step4-test logs -f frontend
#
# Tear down (incl. fresh Postgres volume):
#   docker compose -f docker-compose.step4-test.yml -p step4-test down -v
# ============================================

services:
  frontend:
    image: proxcenter-frontend:local
    container_name: step4-test-frontend
    restart: "no"
    ports:
      - "3030:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://proxcenter:step4-test-pass@postgres:5432/proxcenter?schema=public
      - APP_SECRET=step4-test-app-secret-not-for-prod
      - NEXTAUTH_SECRET=step4-test-nextauth-secret-not-for-prod
      - NEXTAUTH_URL=http://localhost:3030
      - APP_URL=http://localhost:3030
      - ORCHESTRATOR_URL=http://orchestrator:8080
    volumes:
      - frontend_data:/app/data
      # Shared volume so the entrypoint can read the API key the orchestrator
      # writes on first boot (/app/orchestrator_data/.api_key).
      - orchestrator_data:/app/orchestrator_data:ro
    networks:
      - step4_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  orchestrator:
    image: proxcenter-orchestrator:local
    container_name: step4-test-orchestrator
    restart: "no"
    environment:
      # Must match the frontend APP_SECRET so the orchestrator can read
      # encrypted credentials it loads from the shared Postgres.
      - APP_SECRET=step4-test-app-secret-not-for-prod
      - LOG_LEVEL=info
      - LOG_FORMAT=text
      - TZ=Europe/Paris
      - PROXCENTER_DATABASE_DRIVER=postgres
      - PROXCENTER_DATABASE_DSN=postgres://proxcenter:step4-test-pass@postgres:5432/proxcenter?sslmode=disable
      - PROXCENTER_PROXMOX_APP_SECRET=step4-test-app-secret-not-for-prod
      - PROXCENTER_SFLOW_ENABLED=false
      - PROXCENTER_REPORTING_URL=http://weasyprint:5000
    volumes:
      - orchestrator_data:/app/data
    networks:
      - step4_net
    depends_on:
      postgres:
        condition: service_healthy
      # Frontend must apply Prisma migrations before the orchestrator's GORM
      # auto-migrate runs, otherwise Prisma sees a non-empty schema without
      # its migration history and fails with P3005.
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  weasyprint:
    build:
      context: ./weasyprint
    image: proxcenter-weasyprint:local
    container_name: step4-test-weasyprint
    restart: "no"
    networks:
      - step4_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:5000/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: step4-test-postgres
    restart: "no"
    environment:
      - POSTGRES_USER=proxcenter
      - POSTGRES_PASSWORD=step4-test-pass
      - POSTGRES_DB=proxcenter
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - step4_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxcenter -d proxcenter"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  step4_net:
    driver: bridge
    # Project-scoped name (Compose prefixes "step4-test_") so it never
    # collides with the existing dev `proxcenter` network.

volumes:
  frontend_data:
  postgres_data:
  orchestrator_data:
